<!DOCTYPE html>
<html>
<head>
  <script src="https://aframe.io/releases/1.4.1/aframe.min.js"></script>
  <script src="https://unpkg.com/aframe-ar-hit-test-component/dist/aframe-ar-hit-test-component.min.js"></script>
</head>
<body style="margin: 0; background: transparent;">
  <a-scene
    webxr="requiredFeatures: hit-test, local-floor"
    renderer="alpha: true; colorManagement: true"
    vr-mode-ui="enabled: true"
    ar-hit-test="target: #reticle"
    background="color: transparent"
  >
    <!-- cursor para colocar objetos -->
    <a-entity id="reticle"
      geometry="primitive: ring; radiusInner: 0.02; radiusOuter: 0.03"
      material="color: green"
      rotation="-90 0 0"
      visible="false">
    </a-entity>

    <!-- objeto que aparecerá en el mundo real -->
    <a-box      position="0 0 -1"  rotation="0 45 0" color="#4CC3D9"></a-box>
    <a-sphere   position="2 1 -4"  radius="1"        color="#EF2D5E"></a-sphere>
    <a-cylinder position="-2 1 -4" radius="0.5" height="1.5" color="#FFC65D"></a-cylinder>
  </a-scene>
</body>
</html>
