<!DOCTYPE html>
<html>
<head>
<script src="https://aframe.io/releases/1.4.1/aframe.min.js"></script>
<script src="https://unpkg.com/aframe-ar/dist/aframe-ar.js"></script>
</head>

<body>

<a-scene
embedded
arjs="sourceType: webcam;"
vr-mode-ui="enabled: false">

<a-box position="0 0.5 -3" rotation="0 45 0" color="#4CC3D9"></a-box>

<a-sphere position="2 1 -4" radius="1" color="#EF2D5E"></a-sphere>

<a-cylinder position="-2 1 -4" radius="0.5" height="1.5"
color="#FFC65D"></a-cylinder>

<a-plane rotation="-90 0 0" width="10" height="10"
color="#7BC8A4"></a-plane>

<a-camera position="0 1.6 0"></a-camera>

</a-scene>

</body>
</html>
