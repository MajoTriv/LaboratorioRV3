<!DOCTYPE html>
<html>
<head>
<title>Robot Industrial AR</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://aframe.io/releases/1.4.1/aframe.min.js"></script>
</head>

<body>

<a-scene
webxr="optionalFeatures: hit-test, local-floor"
xr-mode-ui="enabled: true"
renderer="alpha:true; antialias:true">

<!-- ILUMINACION -->
<a-entity light="type:ambient; intensity:0.7"></a-entity>
<a-entity light="type:directional; intensity:1" position="3 8 4"></a-entity>

<!-- PISO -->
<a-plane position="-2 0 -7" rotation="-90 0 0" width="18" height="14" color="#CCCCCC"></a-plane>

<!-- CAJA AMARILLA -->
<a-box position="-3.2 0.55 -5" width="1.8" height="1.1" depth="1.5" color="#F5C000"></a-box>

<!-- BASE ROBOT -->
<a-box position="0 0.45 -5" width="1.8" height="0.9" depth="1.8" color="#1B5E20"></a-box>
<a-cylinder position="0 0.92 -5" radius="0.75" height="0.16" color="#1A237E"></a-cylinder>

<!-- ESLABON AZUL -->
<a-box position="0 1.7 -5" width="0.30" height="1.4" depth="0.30" color="#1976D2"></a-box>

<!-- ESFERA -->
<a-sphere position="0 2.4 -5" radius="0.27" color="#1976D2"></a-sphere>

<!-- ESLABON NARANJA -->
<a-box position="0.7 2.85 -5" width="1.664" height="0.25" depth="0.25" rotation="0 0 33" color="#F5A800"></a-box>

<!-- ESFERA -->
<a-sphere position="1.4 3.3 -5" radius="0.27" color="#F57C00"></a-sphere>

<!-- ESLABON AZUL -->
<a-box position="1.4 2.425 -5" width="0.28" height="1.75" depth="0.28" color="#1976D2"></a-box>

<!-- PINZA -->
<a-box position="1.4 1.22 -5" width="0.52" height="0.65" depth="0.40" color="#546E7A"></a-box>
<a-box position="1.22 0.78 -5" width="0.13" height="0.44" depth="0.17" color="#37474F"></a-box>
<a-box position="1.58 0.78 -5" width="0.13" height="0.44" depth="0.17" color="#37474F"></a-box>

<!-- CINTA 1 -->
<a-box position="-4.88 0.55 -6.0" width="0.12" height="0.45" depth="7.2" color="#F5C000"></a-box>
<a-box position="-6.12 0.55 -5.425" width="0.12" height="0.45" depth="8.35" color="#F5C000"></a-box>
<a-box position="-5.5 0.30 -5.425" width="1.4" height="0.05" depth="8.35" color="#E8A000"></a-box>

<a-box position="-5.5 0.77 -6.0" width="1.15" height="0.07" depth="7.0" color="#222222"></a-box>

<a-cylinder position="-5.5 0.77 -2.55" radius="0.10" height="1.15" rotation="0 0 90" color="#888888"></a-cylinder>
<a-cylinder position="-5.5 0.77 -9.45" radius="0.10" height="1.15" rotation="0 0 90" color="#888888"></a-cylinder>

<!-- CAJA CINTA -->
<a-box position="-5.5 1.18 -6.0" width="0.7" height="0.7" depth="0.65" color="#D4943A"></a-box>
<a-box position="-5.5 1.55 -6.0" width="0.71" height="0.04" depth="0.66" color="#B87A2A"></a-box>

<!-- CINTA 2 -->
<a-box position="-1.94 0.55 -1.19" width="8.51" height="0.45" depth="0.12" color="#F5C000"></a-box>
<a-box position="-1.245 0.55 -2.46" width="7.12" height="0.45" depth="0.12" color="#F5C000"></a-box>

<a-box position="-2.575 0.77 -1.825" width="7.0" height="0.07" depth="1.15" color="#222222"></a-box>

<a-cylinder position="-4.88 0.77 -1.825" radius="0.10" height="1.15" rotation="90 0 0" color="#888888"></a-cylinder>
<a-cylinder position="2.22 0.77 -1.825" radius="0.10" height="1.15" rotation="90 0 0" color="#888888"></a-cylinder>

<!-- CAJAS -->
<a-box position="1.62 1.18 -1.825" width="0.7" height="0.7" depth="0.65" color="#D4943A"></a-box>
<a-box position="-1.62 1.18 -1.825" width="0.7" height="0.7" depth="0.65" color="#D4943A"></a-box>
<a-box position="-5.5 1.18 -1.825" width="0.7" height="0.7" depth="0.65" color="#D4943A"></a-box>

<!-- MESA -->
<a-box position="3.6 0.55 -5" width="2.0" height="1.1" depth="1.8" color="#1B5E20"></a-box>

<!-- CAMARA -->
<a-entity position="0 1.6 0">
<a-camera></a-camera>
</a-entity>

</a-scene>

</body>
</html>
